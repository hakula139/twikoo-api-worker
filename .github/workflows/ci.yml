name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake-check:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_name: hakula
          cachix_skip_push: 'true'

      - name: Run flake check
        run: nix flake check --no-build

  check:
    name: Worker Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_name: hakula
          cachix_skip_push: 'true'

      - name: Install dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Type check
        run: nix develop -c pnpm check

      - name: Format
        run: nix develop -c pnpm format

      - name: Lint
        run: nix develop -c pnpm lint

      - name: Spell check
        run: nix develop -c pnpm spellcheck

      - name: Test
        run: nix develop -c pnpm test --coverage

      - name: Bundle size check
        run: |
          nix develop -c pnpm wrangler deploy --dry-run --outdir dist
          # Threshold sits well under Workers' 1 MiB cap with headroom over
          # the current ~500 KiB gzipped build. Bumps here should travel with
          # edits to scripts/bundle-trim.mjs (trim list).
          THRESHOLD=$((950 * 1024))
          GZIPPED=$(gzip -c dist/worker.js | wc -c)
          echo "Compressed bundle: ${GZIPPED} bytes (threshold: ${THRESHOLD})"
          if [ "${GZIPPED}" -gt "${THRESHOLD}" ]; then
            echo "::error::Compressed bundle ${GZIPPED}B exceeds ${THRESHOLD}B threshold"
            exit 1
          fi

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
