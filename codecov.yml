# Coverage is informational during the test-suite ramp-up: PRs adding handlers /
# DB / dispatch code currently land without tests, and a hard 80% patch gate
# would block them. Flip both to enforced once the suite covers `lib/` + `db/`.
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        informational: true
