# `lib/` + `db/` are both above 90% statement coverage. Patch coverage is now
# enforced at 70% so new code lands with tests; project stays informational
# until handlers / dispatch / worker catch up.
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 70%
